site_name: "AI MASTER CLASS ARCHIVE"
site_description: "실무 도입부터 에이전트 설계, 파이프라인 구축까지 — AI 활용 교육, 워크숍, 마스터클래스 실전 아카이브"
site_url: ""

docs_dir: docs
theme:
  name: material
  language: ko
  
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환

  font:
    text: Pretendard
    code: JetBrains Mono

  features:
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - toc.follow

  icon:
    logo: material/lightbulb-outline

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/password.js

nav:
  - 홈: index.md
  - "🔒 아티스트, 창작자를 위한 AI 개론":
    - "🔒 00. 시작 — 어디서부터": 00_시작.md
    - "🔒 01. 도구 — 뭘 쓸 것인가": 01_도구.md
    - "🔒 02. 루틴 — 어디에 넣을 것인가": 02_루틴.md
    - "🔒 03. 확장 — 사고를 시스템으로": 03_확장.md
    - "🔒 04. 시스템 — 에이전트와 파이프라인": 04_시스템.md
  - "🔒 에이전트는 공부하는 게 아닙니다": lectures/260715_agent_design.md
  - "🔒 MCP × AI 영상 (마케터·영상편집 자동화)": lectures/260715_mcp_video.md
  - "🔒 창작 구체화 (내 생각을 시스템으로)": lectures/260618_creativity.md
  - "🔒 실무 자동화 (AI 콘텐츠 공장)": lectures/260212_automation.md
  - "🔒 글로벌 피칭 (실리콘밸리 콜드메일)": lectures/251114_coldmail.md
  - "🔒 개발 워크플로우 (바이브코딩)": lectures/250515_vibecoding.md
  - "🔒 미드저니 (AI 이미지 생성 워크숍)": lectures/230512_midjourney.md
  - "📋 미드저니 화풍 & 프롬프트 시트": lectures/midjourney_prompt_sheet.md
  - "🔒 기획서 작성 (AI로 기획안 쓰기)": lectures/230411_planning.md

plugins:
  - search:
      lang: 
        - ko
        - en
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social: []
  generator: false

copyright: ""
